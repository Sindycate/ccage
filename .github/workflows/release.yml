name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} does not match CAGE_VERSION=\"${SCRIPT_VER}\" in cage script"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - name: Create tarball
        run: |
          DIST="cage-${VERSION}"
          mkdir "$DIST"
          cp cage cage-setup.sh cage-profiles.sh cage-netgate.sh netgate-proxy.py docker-compose.yml \
             Dockerfile Dockerfile.codex \
             entrypoint.sh entrypoint-codex.sh \
             install.sh Makefile README.md \
             "$DIST/"
          cp -r netgate "$DIST/"
          tar czf "${DIST}.tar.gz" "$DIST"
          shasum -a 256 "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIST="cage-${VERSION}"
          gh release create "v${VERSION}" \
            --title "cage ${VERSION}" \
            --generate-notes \
            "${DIST}.tar.gz" \
            "${DIST}.tar.gz.sha256"

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: claude-code
            dockerfile: Dockerfile
          - image: codex
            dockerfile: Dockerfile.codex
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SCRIPT_VER="$(grep '^CAGE_VERSION=' cage | cut -d'"' -f2)"
          if [ "$TAG" != "$SCRIPT_VER" ]; then
            echo "ERROR: Tag v${TAG} != CAGE_VERSION=${SCRIPT_VER}"
            exit 1
          fi
          echo "VERSION=$TAG" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sindycate/cage/${{ matrix.image }}:${{ env.VERSION }}
            ghcr.io/sindycate/cage/${{ matrix.image }}:latest
